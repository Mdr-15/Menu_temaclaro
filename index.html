<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Interactivo | Space Wings</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); text-align: center; padding: 20px; border-bottom: 1px solid #334155; }
        .logo-text { font-size: 28px; font-weight: 900; letter-spacing: 4px; color: #f59e0b; margin: 0; }
        
        /* Contenedor Principal */
        .main-container { display: flex; flex-direction: row; flex: 1; max-width: 1200px; width: 100%; margin: 20px auto; padding: 0 20px; gap: 30px; box-sizing: border-box; }
        
        /* COLUMNA IZQUIERDA: Categorías y Productos */
        .catalog-section { flex: 1; display: flex; flex-direction: column; gap: 25px; }
        .category-title { font-size: 18px; color: #f59e0b; border-bottom: 2px solid #1e293b; padding-bottom: 8px; margin: 0; font-weight: 800; text-transform: uppercase; }
        .products-grid { display: flex; flex-direction: column; gap: 12px; }
        
        /* Tarjeta de Producto */
        .product-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .product-main { display: flex; justify-content: space-between; align-items: center; }
        .product-name { font-size: 16px; font-weight: 700; }
        .product-price { font-size: 15px; font-weight: 800; color: #f59e0b; }
        
        /* Selectores internos con Grid para Combos */
        .sauce-selector { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .sauce-selector label { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .combo-grid-selectors { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .sauce-select { background: #1e293b; color: #fff; border: 1px solid #334155; padding: 6px; border-radius: 6px; font-size: 13px; outline: none; width: 100%; box-sizing: border-box; }
        
        .add-btn { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #0f172a; border: none; padding: 8px 16px; cursor: pointer; border-radius: 8px; font-weight: 800; font-size: 13px; align-self: flex-end; }
        
        /* COLUMNA DERECHA: Carrito Compacto */
        .cart-section { width: 280px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 20px; height: max-content; }
        .digital-cart { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 16px; box-sizing: border-box; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .cart-title { font-size: 16px; font-weight: 800; border-bottom: 1px solid #334155; padding-bottom: 10px; margin: 0 0 12px 0; display: flex; justify-content: space-between; }
        .cart-count { background: #f59e0b; color: #0f172a; font-size: 11px; padding: 2px 6px; border-radius: 10px; }
        
        .client-box { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
        .client-box label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
        .client-box input { background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #fff; padding: 8px; font-size: 13px; outline: none; }
        
        .cart-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; margin-bottom: 12px; }
        .cart-item { display: flex; flex-direction: column; gap: 6px; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
        .item-row { display: flex; justify-content: space-between; font-size: 13px; }
        .item-sauce { font-size: 11px; color: #f59e0b; font-style: italic; margin-top: 2px; line-height: 1.3; }
        
        .comment-box { width: 100%; background: #1e293b; border: 1px solid #475569; border-radius: 4px; color: #e2e8f0; padding: 4px 6px; font-size: 11px; box-sizing: border-box; }
        
        .qty-controls { display: flex; align-items: center; gap: 6px; }
        .cant-btn { background: #334155; color: #fff; border: none; width: 20px; height: 20px; cursor: pointer; border-radius: 4px; font-size: 11px; }
        .del-btn { background: transparent; color: #ef4444; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        .summary-box { border-top: 1px dashed #334155; padding-top: 10px; display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
        .btn-send { padding: 12px; background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: #fff; border: none; width: 100%; cursor: pointer; font-weight: 800; border-radius: 8px; font-size: 13px; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; padding: 0 10px; }
            .cart-section { width: 100%; position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">SPACE WINGS</h1>
    </header>

    <div class="main-container">
        <section class="catalog-section" id="menu-categorias"></section>

        <section class="cart-section">
            <div class="digital-cart">
                <div class="cart-title"><span>🛒 Pedido</span><span class="cart-count" id="badge-count">0</span></div>
                <div class="client-box"><label>Cliente</label><input type="text" id="cliente_input" value="Cliente Nuevo"></div>
                <div class="cart-list" id="lista-carrito"></div>
                <div class="summary-box"><span>Total:</span><strong>$<span id="tot">0.00</span></strong></div>
                <button class="btn-send" onclick="enviarWhatsApp()">💬 ENVIAR POR WHATSAPP</button>
            </div>
        </section>
    </div>

    <script>
        const salsasDisponibles = ["Bbq Hot", "Buffalo", "Maracuya Hot", "Mango Habanero", "Piña Habanero", "Fresa Habanero"];
        const snacksDisponibles = ["Papas a la francesa", "Papas Gajo", "Dedos de queso", "Jalapeños rellenos", "Aros de cebolla"];
        const platillosDisponibles = ["Alitas", "Boneless", "Palomitas"];

        const estructuraMenu = [
            {
                categoria: "Platillo Principal",
                items: [
                    { id: "alitas", nombre: "Alitas", precio: 120.00, requiereSalsa: true },
                    { id: "boneless", nombre: "Boneless", precio: 120.00, requiereSalsa: true },
                    { id: "palomitas", nombre: "Palomitas", precio: 120.00, requiereSalsa: true }
                ]
            },
            {
                categoria: "Snacks",
                items: [
                    { id: "Papas_francesa", nombre: "Papas a la francesa", precio: 70.00 },
                    { id: "Papas_gajo", nombre: "Papas Gajo", precio: 70.00 },
                    { id: "Dedos_queso", nombre: "Dedos de queso", precio: 80.00 },
                    { id: "Jalapenos", nombre: "Jalapeños rellenos", precio: 80.00 },
                    { id: "Aros_cebolla", nombre: "Aros de cebolla", precio: 70.00 }
                ]
            },
            {
                categoria: "Bebidas",
                items: [
                    { id: "coca_400", nombre: "Coca Cola 400 ml", precio: 25.00 },
                    { id: "coca_600", nombre: "Coca Cola 600 ml", precio: 35.00 },
                    { id: "coca_25", nombre: "Coca Cola 2.5 Lts", precio: 55.00 }
                ]
            },
            {
                categoria: "Combos",
                items: [
                    { id: "c_estrella", nombre: "Combo Estrella (Platillo + 2 Snacks)", precio: 220.00, tipoCombo: "estrella" },
                    { id: "c_cometa", nombre: "Combo Cometa (2 Platillos + 1 Snack Fijo)", precio: 260.00, tipoCombo: "cometa" }
                ]
            }
        ];

        let carrito = [];

        const contenedorMenu = document.getElementById('menu-categorias');
        estructuraMenu.forEach(cat => {
            let catHTML = `<div class="products-grid"><h2 class="category-title">${cat.categoria}</h2>`;
            
            cat.items.forEach(prod => {
                let bloqueSelectores = "";
                
                if (prod.requiereSalsa) {
                    bloqueSelectores = `
                        <div class="sauce-selector">
                            <label>Salsa para el platillo:</label>
                            <select class="sauce-select" id="salsa_${prod.id}">
                                ${salsasDisponibles.map(s => `<option value="${s}">${s}</option>`).join('')}
                            </select>
                        </div>`;
                }
                
                // Renderizado para el Combo Estrella (1 Platillo + 2 Snacks de libre elección)
                if (prod.tipoCombo === "estrella") {
                    bloqueSelectores = `
                        <div class="sauce-selector">
                            <label style="color:#f59e0b; margin-bottom:4px; display:block;">⚙️ Configura tu Combo Estrella:</label>
                            <div class="combo-grid-selectors">
                                <select class="sauce-select" id="platillo_${prod.id}">
                                    ${platillosDisponibles.map(p => `<option value="${p}">${p}</option>`).join('')}
                                </select>
                                <select class="sauce-select" id="salsacombo_${prod.id}">
                                    ${salsasDisponibles.map(s => `<option value="${s}">Salsa: ${s}</option>`).join('')}
                                </select>
                                <select class="sauce-select" id="snack1_${prod.id}">
                                    <option value="" disabled selected>Elegir Snack 1</option>
                                    ${snacksDisponibles.map(s => `<option value="${s}">${s}</option>`).join('')}
                                </select>
                                <select class="sauce-select" id="snack2_${prod.id}">
                                    <option value="" disabled selected>Elegir Snack 2</option>
                                    ${snacksDisponibles.map(s => `<option value="${s}">${s}</option>`).join('')}
                                </select>
                            </div>
                        </div>`;
                }

                // Renderizado para el Combo Cometa (2 Platillos libres + 1 Snack Predeterminado/Fijo)
                if (prod.tipoCombo === "cometa") {
                    bloqueSelectores = `
                        <div class="sauce-selector">
                            <label style="color:#f59e0b; margin-bottom:4px; display:block;">⚙️ Configura tu Combo Cometa:</label>
                            <div class="combo-grid-selectors">
                                <span style="font-size:11px; font-weight:bold; color:#94a3b8; display:block; margin-top:2px;">PLATILLO PRINCIPAL 1:</span>
                                <select class="sauce-select" id="c1_p1_${prod.id}">
                                    ${platillosDisponibles.map(p => `<option value="${p}">${p}</option>`).join('')}
                                </select>
                                <select class="sauce-select" id="c1_s1_${prod.id}">
                                    ${salsasDisponibles.map(s => `<option value="${s}">Salsa 1: ${s}</option>`).join('')}
                                </select>

                                <span style="font-size:11px; font-weight:bold; color:#94a3b8; display:block; margin-top:6px;">PLATILLO PRINCIPAL 2:</span>
                                <select class="sauce-select" id="c2_p2_${prod.id}">
                                    ${platillosDisponibles.map(p => `<option value="${p}">${p}</option>`).join('')}
                                </select>
                                <select class="sauce-select" id="c2_s2_${prod.id}">
                                    ${salsasDisponibles.map(s => `<option value="${s}">Salsa 2: ${s}</option>`).join('')}
                                </select>

                                <span style="font-size:11px; font-weight:bold; color:#94a3b8; display:block; margin-top:6px;">SNACK INCLUIDO (FIJO):</span>
                                <select class="sauce-select" id="snack_fijo_${prod.id}">
                                    ${snacksDisponibles.map(s => `<option value="${s}">${s}</option>`).join('')}
                                </select>
                            </div>
                        </div>`;
                }

                catHTML += `
                    <div class="product-card">
                        <div class="product-main">
                            <span class="product-name">${prod.nombre}</span>
                            <span class="product-price">$${prod.precio.toFixed(2)}</span>
                        </div>
                        ${bloqueSelectores}
                        <button class="add-btn" onclick="agregarAlCarrito('${cat.categoria}', '${prod.id}')">Agregar +</button>
                    </div>`;
            });
            
            catHTML += `</div>`;
            contenedorMenu.innerHTML += catHTML;
        });

        function agregarAlCarrito(catNombre, prodId) {
            const cat = estructuraMenu.find(c => c.categoria === catNombre);
            const prod = cat.items.find(p => p.id === prodId);
            
            let configuracionAdicional = "";

            if (prod.tipoCombo === "estrella") {
                const pBase = document.getElementById(`platillo_${prodId}`).value;
                const sCombo = document.getElementById(`salsacombo_${prodId}`).value;
                const s1 = document.getElementById(`snack1_${prodId}`).value;
                const s2 = document.getElementById(`snack2_${prodId}`).value;

                if (!s1 || !s2) {
                    alert("Por favor, selecciona ambos snacks antes de agregar el combo.");
                    return;
                }
                configuracionAdicional = `[${pBase} c/ ${sCombo} + ${s1} + ${s2}]`;
            } else if (prod.tipoCombo === "cometa") {
                const p1 = document.getElementById(`c1_p1_${prodId}`).value;
                const s1 = document.getElementById(`c1_s1_${prodId}`).value;
                const p2 = document.getElementById(`c2_p2_${prodId}`).value;
                const s2 = document.getElementById(`c2_s2_${prodId}`).value;
                const snackFijo = document.getElementById(`snack_fijo_${prodId}`).value;

                configuracionAdicional = `[${p1} c/ ${s1} + ${p2} c/ ${s2} + ${snackFijo}]`;
            } else if (prod.requiereSalsa) {
                configuracionAdicional = document.getElementById(`salsa_${prodId}`).value;
            }

            const existe = carrito.find(item => item.id === prodId && item.detalles === configuracionAdicional);
            
            if (existe) {
                existe.cantidad++;
            } else {
                carrito.push({ ...prod, cantidad: 1, detalles: configuracionAdicional, comentario: "" });
            }
            actualizarInterfaz();
        }

        function cambiarCantidad(id, detalles, cambio) {
            const item = carrito.find(p => p.id === id && p.detalles === detalles);
            if (!item) return;
            item.cantidad += cambio;
            if (item.cantidad <= 0) {
                carrito = carrito.filter(p => !(p.id === id && p.detalles === detalles));
            }
            actualizarInterfaz();
        }

        function eliminarDelCarrito(id, detalles) {
            carrito = carrito.filter(p => !(p.id === id && p.detalles === detalles));
            actualizarInterfaz();
        }

        function guardarComentario(id, detalles, texto) {
            const item = carrito.find(p => p.id === id && p.detalles === detalles);
            if (item) { item.comentario = texto; }
        }

        function actualizarInterfaz() {
            const listaHTML = document.getElementById('lista-carrito');
            listaHTML.innerHTML = "";
            let cuentaTotal = 0;
            let totalArticulos = 0;

            if(carrito.length === 0) {
                listaHTML.innerHTML = `<div style="text-align:center; color:#64748b; padding:20px; font-size:12px;">Carrito vacío.</div>`;
            }

            carrito.forEach(item => {
                let importeItem = item.precio * item.cantidad;
                cuentaTotal += importeItem;
                totalArticulos += item.cantidad;

                let lineaDetalle = item.detalles ? `<div class="item-sauce">${item.detalles}</div>` : "";

                listaHTML.innerHTML += `
                    <div class="cart-item">
                        <div class="item-row">
                            <div style="flex:1; min-width:0; padding-right:4px;">
                                <strong style="font-size:13px; display:block; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${item.nombre}</strong>
                                ${lineaDetalle}
                                <span style="color:#f59e0b; font-weight:700; font-size:12px;">$${importeItem.toFixed(2)}</span>
                            </div>
                            <div class="qty-controls">
                                <button class="cant-btn" onclick="cambiarCantidad('${item.id}', '${item.detalles}', -1)">-</button>
                                <span style="font-size:12px; font-weight:700;">${item.cantidad}</span>
                                <button class="cant-btn" onclick="cambiarCantidad('${item.id}', '${item.detalles}', 1)">+</button>
                                <button class="del-btn" onclick="eliminarDelCarrito('${item.id}', '${item.detalles}')">×</button>
                            </div>
                        </div>
                        <input type="text" class="comment-box" placeholder="Notas (salsa, aderezo...)" value="${item.comentario}" oninput="guardarComentario('${item.id}', '${item.detalles}', this.value)">
                    </div>`;
            });

            document.getElementById('badge-count').textContent = totalArticulos;
            document.getElementById('tot').textContent = cuentaTotal.toFixed(2);
        }

        function enviarWhatsApp() {
    if(carrito.length === 0) {
        alert("Por favor, agrega al menos un producto al carrito antes de enviar.");
        return;
    }

    const nombreCliente = document.getElementById('cliente_input').value.trim();
    
    // Construcción del mensaje de texto formateado para Space Wings
    let mensaje = `🚀 *NUEVO PEDIDO - SPACE WINGS* 🚀\n`;
    mensaje += `👤 *Cliente:* ${nombreCliente}\n`;
    mensaje += `-------------------------------------\n`;
    
    carrito.forEach(item => {
        let subtotal = item.precio * item.cantidad;
        mensaje += `📦 *${item.cantidad}x* ${item.nombre}\n`;
        
        // Inyecta el desglose de salsas o los 2 snacks elegidos en el combo
        if(item.detalles) {
            mensaje += `   ✨ _Config: ${item.detalles}_\n`;
        }
        // Inyecta los comentarios adicionales por artículo si existen
        if (item.comentario && item.comentario.trim() !== "") {
            mensaje += `   📝 _Nota: ${item.comentario.trim()}_\n`;
        }
        mensaje += `   💰 _Subtotal: $${subtotal.toFixed(2)}_\n`;
    });
    
    mensaje += `-------------------------------------\n`;
    mensaje += `💰 *TOTAL A PAGO:* $${document.getElementById('tot').textContent}\n\n`;
    mensaje += `¡Muchas gracias! 🙌`;

    // Enlace de redirección seguro sin texto basura alrededor
    const urlWhatsApp = "https://wa.me/523411398581?text=" + encodeURIComponent(mensaje);
    window.open(urlWhatsApp, '_blank');
}

// Inicialización del carrito vacío en pantalla al cargar
actualizarInterfaz();
</script>
</body>
</html>
